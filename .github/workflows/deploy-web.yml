name: deploy-web

on:
  workflow_dispatch:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["build-data"]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node, install dependencies, and build shared workspaces
        uses: ./.github/actions/setup-node-workspaces
        with:
          build-target: schemas

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build web app
        run: npm run build --workspace @lawmaker-monitor/web
        env:
          VITE_DATA_REPO_BASE_URL: ${{ vars.DATA_REPO_BASE_URL }}
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Package Pages artifact
        run: |
          tar \
            --dereference \
            --hard-dereference \
            --directory apps/web/dist \
            -cvf "$RUNNER_TEMP/github-pages.tar" \
            --exclude=.git \
            --exclude=.github \
            .

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: ${{ runner.temp }}/github-pages.tar
          retention-days: 1
          if-no-files-found: error

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
