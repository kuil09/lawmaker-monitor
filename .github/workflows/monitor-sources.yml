name: monitor-sources

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node, install dependencies, and build shared workspaces
        uses: ./.github/actions/setup-node-workspaces
        with:
          build-target: schemas-and-ingest

      - name: Run source monitoring
        id: monitor
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm run monitor:sources --workspace @lawmaker-monitor/ingest > monitor-sources.log 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Upsert incident issue when monitoring fails
        if: steps.monitor.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const marker = "<!-- source-monitoring-incident-key: monitor-sources -->";
            const title = "Source monitoring incident: parser assumptions drifted";
            const logPath = "monitor-sources.log";
            const rawLog = fs.existsSync(logPath) ? fs.readFileSync(logPath, "utf8").trim() : "";
            const excerpt = (rawLog || "No monitoring log was captured.")
              .split("\n")
              .slice(-40)
              .join("\n")
              .replace(/```/g, "'''");
            const labels = ["source-monitoring"];
            const body = [
              marker,
              "",
              "The source monitoring workflow detected parser, schema, or fixture drift in the official Assembly source surface.",
              "",
              `- Workflow run: ${runUrl}`,
              `- Run attempt: ${context.runAttempt}`,
              `- Ref: \`${context.ref}\``,
              `- Commit: \`${context.sha}\``,
              `- Detected at: ${new Date().toISOString()}`,
              "",
              "Failure excerpt:",
              "```text",
              excerpt,
              "```",
              "",
              "Please inspect upstream payload changes and parser assumptions before the next data publish."
            ].join("\n");

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: labels.join(","),
              per_page: 100
            });

            const monitoringIssues = openIssues
              .filter((issue) => !issue.pull_request)
              .filter((issue) =>
                issue.body?.includes(marker) ||
                issue.title.startsWith("Source monitoring failure -") ||
                issue.title === title
              )
              .sort((left, right) => left.number - right.number);

            const canonicalIssue = monitoringIssues[0];

            if (!canonicalIssue) {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels
              });
              return;
            }

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: canonicalIssue.number,
              title,
              body,
              labels
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: canonicalIssue.number,
              body: [
                "## Monitoring Failure",
                "",
                `Latest run: ${runUrl}`,
                `- Commit: \`${context.sha}\``,
                `- Attempt: ${context.runAttempt}`,
                "",
                "The open incident was updated instead of creating a duplicate."
              ].join("\n")
            });

            for (const duplicate of monitoringIssues.slice(1)) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: duplicate.number,
                body: [
                  "## Duplicate Incident Closed",
                  "",
                  `Superseded by #${canonicalIssue.number} after reusing the shared source monitoring incident key.`
                ].join("\n")
              });

              await github.rest.issues.update({
                owner,
                repo,
                issue_number: duplicate.number,
                state: "closed",
                state_reason: "not_planned"
              });
            }
      - name: Close open monitoring incidents when monitoring succeeds
        if: steps.monitor.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const marker = "<!-- source-monitoring-incident-key: monitor-sources -->";

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: "source-monitoring",
              per_page: 100
            });

            const monitoringIssues = openIssues
              .filter((issue) => !issue.pull_request)
              .filter((issue) =>
                issue.body?.includes(marker) ||
                issue.title.startsWith("Source monitoring failure -") ||
                issue.title === "Source monitoring incident: parser assumptions drifted"
              );

            for (const incident of monitoringIssues) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: incident.number,
                body: [
                  "## Monitoring Recovered",
                  "",
                  `Run: ${runUrl}`,
                  "",
                  "The latest source monitoring run completed successfully, so this incident is being closed automatically."
                ].join("\n")
              });

              await github.rest.issues.update({
                owner,
                repo,
                issue_number: incident.number,
                state: "closed",
                state_reason: "completed"
              });
            }

      - name: Fail workflow when monitoring fails
        if: steps.monitor.outcome == 'failure'
        run: exit 1
