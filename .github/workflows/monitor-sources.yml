name: monitor-sources

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build schema and ingest packages
        run: npm run build --workspace @lawmaker-monitor/schemas && npm run build --workspace @lawmaker-monitor/ingest

      - name: Run source monitoring
        id: monitor
        continue-on-error: true
        run: npm run monitor:sources --workspace @lawmaker-monitor/ingest

      - name: Create incident issue when monitoring fails
        if: steps.monitor.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString();
            const title = `Source monitoring failure - ${date}`;
            const body = [
              "The scheduled source monitoring workflow detected a parsing or schema issue.",
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Please inspect upstream payload changes before the next data publish."
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["source-monitoring"]
            });
