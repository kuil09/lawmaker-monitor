name: Setup Node Workspaces
description: Setup Node.js, install dependencies with npm ci, and optionally build shared workspaces.

inputs:
  node-version:
    description: Node.js version to install
    required: false
    default: "24"
  build-target:
    description: Shared workspace build target
    required: false
    default: "schemas-and-ingest"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Restore TypeScript build cache
      id: ts-cache
      uses: actions/cache@v5
      with:
        path: |
          packages/schemas/dist
          packages/ingest/dist
        key: ts-build-${{ inputs.build-target }}-${{ hashFiles('packages/schemas/src/**', 'packages/ingest/src/**', 'packages/schemas/tsconfig.json', 'packages/ingest/tsconfig.json', 'package-lock.json') }}

    - name: Build shared workspaces
      if: steps.ts-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        case "${{ inputs.build-target }}" in
          none)
            echo "Skipping shared workspace build."
            ;;
          schemas)
            npm run build --workspace @lawmaker-monitor/schemas
            ;;
          schemas-and-ingest)
            npm run build --workspace @lawmaker-monitor/schemas
            npm run build --workspace @lawmaker-monitor/ingest
            ;;
          *)
            echo "Unknown build target: ${{ inputs.build-target }}" >&2
            exit 1
            ;;
        esac
